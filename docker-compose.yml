# Canvas Learning System - Docker Compose Configuration
# Story 1.1: Project Scaffold & Docker Setup
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d neo4j        # Start Neo4j only
#   docker-compose logs -f            # View logs
#   docker-compose down               # Stop and remove containers
#
# Prerequisites:
#   - Docker Desktop installed
#   - Copy backend/.env.example to backend/.env and set NEO4J_PASSWORD

version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # Neo4j Graph Database
  # ═══════════════════════════════════════════════════════════════════════════
  neo4j:
    image: neo4j:5.26-community
    container_name: canvas-learning-system-neo4j

    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_allow__upgrade=true

    # NOTE: Using 7478/7691 to avoid conflict with existing Neo4j instances (7474/7476/7687/7689)
    ports:
      - "7478:7474"  # HTTP Browser - access at http://localhost:7478
      - "7691:7687"  # Bolt Protocol - application connection

    volumes:
      - ./docker/neo4j/data:/data
      - ./docker/neo4j/logs:/logs
      - ./docker/neo4j/plugins:/plugins

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

    restart: unless-stopped

    networks:
      - canvas-network

  # ═══════════════════════════════════════════════════════════════════════════
  # Ollama - Local LLM / Embedding Server
  # Story 1.1 Task 1.2: Ollama service for bge-m3 embeddings
  # ═══════════════════════════════════════════════════════════════════════════
  ollama:
    image: ollama/ollama:latest
    container_name: canvas-learning-system-ollama

    environment:
      - OLLAMA_NUM_PARALLEL=1    # V7: explicit single-request (RTX 4060 8GB VRAM budget)
      - OLLAMA_MAX_QUEUE=8       # V7: prevent unbounded queue buildup under burst traffic

    ports:
      - "11434:11434"

    volumes:
      - ./docker/ollama/models:/root/.ollama/models

    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

    restart: unless-stopped

    # GPU passthrough for Ollama (RTX 4060 — Qwen3 8B inference ~37s vs CPU 120s)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    networks:
      - canvas-network

  # ═══════════════════════════════════════════════════════════════════════════
  # FastAPI Backend
  # Story 1.1 Task 1.1: FastAPI service with health check
  # ═══════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: canvas-learning-system-backend

    ports:
      - "8001:8001"

    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - OLLAMA_HOST=http://ollama:11434
      - CANVAS_BASE_PATH=/app/vault
      - PYTHONPATH=/app:/app/src
      - DEBUG=true
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,http://tauri.localhost,app://obsidian.md
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}

    volumes:
      - ./backend:/app
      - ./src:/app/src
      - canvas-lancedb:/app/data/lancedb
      - ./data:/app/data
      # Obsidian vault notes for RAG indexing
      - "C:/Users/Heishing/Desktop/spring course 2026/CS188:/app/vault/CS188:ro"
      - "C:/Users/Heishing/Desktop/spring course 2026/CS 189:/app/vault/CS189:ro"

    depends_on:
      neo4j:
        condition: service_healthy
      ollama:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

    restart: unless-stopped

    networks:
      - canvas-network
      - cliproxyapi-network

# ═══════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════
networks:
  canvas-network:
    driver: bridge
    name: canvas-learning-network
  cliproxyapi-network:
    external: true
    name: cliproxyapi_default

volumes:
  canvas-lancedb:
    name: canvas-lancedb-data
