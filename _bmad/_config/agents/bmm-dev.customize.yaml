# Agent Customization — Dev (Amelia) — Canvas BMAD Extension
# Custom menu items and critical actions for feedback processing and bug tracing

agent:
  metadata:
    name: ""

persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

critical_actions:
  - |
    Before any dev-story task, run `custom-bmm-ext:scan-feedback --mode=pending-summary`
    and warn user if there are unprocessed User Feedback annotations on the current Story.

memories: []

menu:
  - trigger: af
    workflow: "{project-root}/_bmad/custom-bmm-ext/workflows/apply-feedback/workflow.yaml"
    description: "[AF] Apply Feedback - Process user annotations by intent (minor/moderate/major)"
  - trigger: lb
    workflow: "{project-root}/_bmad/custom-bmm-ext/workflows/locate-by-bug/workflow.yaml"
    description: "[LB] Locate By Bug - Trace BugID to DecisionID to Story to code paths"

prompts: []
