        - buildFeedbackAppend
      runtime_class: QuickExamController
    - path: frontend/obsidian-plugin/src/main.ts
      kind: modified
      onload_added:
        - "new QuickExamController({ app, callBackendJson, inferCurrentVaultId })"
        - "registerEvent vault.on('modify') → quickExam.onFileModified"
        - "addCommand id='canvas:start-quick-exam' name='Quick Exam（单题考察, MVP-α）'"
    - path: frontend/obsidian-plugin/tests/exam-quick.test.ts
      kind: new
      tests: 35
      all_pass: true
  exam_file_protocol:
    location: 节点/考察-{concept}-{YYYY-MM-DD}[-{n}].md
