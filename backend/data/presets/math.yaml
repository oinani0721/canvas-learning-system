# Phase B0.6 Preset: 数学课程（重讲义 + 习题集 + 笔记，弱视频）
# 适用 vault: 微积分 / 线性代数 / 离散数学 / 概率论 等数学课
# 推断触发: source_types 含 "lecture_notes" + "exercises", 不含 "video_transcript"
preset_type: math
preset_label: "数学 (Math)"
recommended_source_types:
  - lecture_notes
  - exercises
  - user_notes
priority_patterns:
  # === Demote 优先匹配 ===
  - {pattern: "**/*-explanations/**",         weight: 0.5, label: "AI 解释 (demote)"}
  - {pattern: "原白板/**",                     weight: 0.3, label: "白板导航层"}
  - {pattern: "节点/**",                       weight: 1.0, label: "派生节点 (数学推导用户笔记权重高)"}
  # === Boost ===
  - {pattern: "**/{textbook,教材,书}/**",      weight: 1.5, label: "教材正文"}
  - {pattern: "**/{lecture-notes,讲义,课件,notes}/**", weight: 1.4, label: "讲义/课件"}
  - {pattern: "**/{problem-sets,习题,exercises,作业}/**", weight: 1.3, label: "习题集"}
  - {pattern: "**/{past_exams,真题,期中,期末}/**", weight: 1.2, label: "真题"}
  - {pattern: "**/{solutions,题解,答案}/**",   weight: 1.1, label: "题解"}
  - {pattern: "**/videos/**",                 weight: 0.9, label: "视频 (数学课视频弱)"}
max_references: 10
excluded_headings:
  - "Recent Activity"
  - "Concepts"
  - "目录"
  - "索引"
  - "Tags"
  - "Backlinks"
