[pytest]
# Canvas Learning System - pytest Configuration
# ✅ Verified from Context7:/websites/fastapi_tiangolo (topic: testing)
# [Source: docs/architecture/coding-standards.md#测试规范]
# [Source: ADR-008 - Testing Framework pytest]

# Test file patterns
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# asyncio mode for async tests
asyncio_mode = auto

# Output verbosity (coverage moved to scripts/coverage-check.sh, not in default addopts)
# Reason: --cov-fail-under=85 caused every pytest invocation (including hooks) to fail
# at 23.4% actual coverage. Run coverage separately: pytest --cov=app --cov-fail-under=30
addopts =
    -v
    --tb=short

# Parallel testing with pytest-xdist (use -n auto for automatic CPU detection)
# Run with: pytest -n auto
# Note: Not enabled by default to avoid issues with shared fixtures

# Markers
# [Source: docs/stories/33.8.story.md - Task 8.3]
markers =
    smoke: fast boot/health verification (< 5s, PostToolUse Tier 1)
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    contract: marks tests as contract/schema tests
    e2e: marks tests as end-to-end tests (Story 33.8)
    performance: marks tests as performance benchmarks (Story 33.8)
    websocket: marks tests requiring WebSocket connections (Story 33.8)
    p0: marks P0 blocker tests (core functionality)
    p1: marks P1 high priority tests
    bdd: behavior-driven development tests (pytest-bdd)
    p2: marks P2 medium priority tests
    real_neo4j: marks tests that need the dedicated Neo4j test container (port 7692)
