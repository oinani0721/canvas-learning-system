# Subject Mapping Configuration (Story 1.9)
# Users can add their own mappings via the Settings UI or by editing this file.
# Mappings are ordered: first match wins.
mappings: []

# Category inference rules: when no explicit mapping matches, the first
# significant directory component is tested against these patterns.
category_rules:
  math:
  - math*
  - 数学*
  physics:
  - physics*
  - 物理*
  cs:
  - CS*
  - cs*
  - 计算机*

# Fallback defaults when nothing matches
defaults:
  category: general
  subject: general

# Directories to skip when inferring subject from path
skip_directories:
- notes
- templates
- .canvas-links
- .trash
- .obsidian
- .git
- node_modules
